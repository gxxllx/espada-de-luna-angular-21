<div class="register-container">
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
    <div class="register-form__name-container">
      <input-field
        label="Nombre"
        id="first_name"
        type="text"
        placeholder="Ingrese su nombre"
        controlName="first_name"
        maxlength="50"
        [showError]="showFirstNameError()"
        errorMessage="Mínimo 2 caracteres"
      />

      <input-field
        label="Apellido"
        id="last_name"
        type="text"
        placeholder="Ingrese su apellido"
        controlName="last_name"
        maxlength="50"
        [showError]="showLastNameError()"
        errorMessage="Mínimo 2 caracteres"
      />
    </div>

    <input-field
      label="Email"
      id="email"
      type="email"
      placeholder="Ingrese su email"
      controlName="email"
    />

    <input-field
      label="Contraseña"
      id="user_password"
      type="password"
      controlName="user_password"
      placeholder="Ingrese su contraseña"
      autoComplete="new-password"
      [showError]="registerForm.hasError('weak')"
      errorMessage="La contraseña debe tener al menos 8 caracteres, una mayúscula, un número y un símbolo"
    />

    <div class="power-container">
      <div
        id="power-point"
        [style.width]="passwordStrength().width"
        [style.backgroundColor]="passwordStrength().color"
      ></div>
    </div>

    <input-field
      label="Repetir Contraseña"
      id="user_password_confirm"
      type="password"
      controlName="user_password_confirm"
      placeholder="Repita su contraseña"
      autoComplete="new-password"
      [showError]="registerForm.hasError('mismatch')"
      errorMessage="Las contraseñas no coinciden"
    />

    <button-field
      label="Registrar"
      type="submit"
      [disabled]="registerForm.invalid"
      [showError]="!!serverErrorMessage()"
      [errorMessage]="serverErrorMessage() || 'Error al registrar'"
    />

    <div class="register-form__login">
      <span class="register-form__login-link"> ¿Ya tienes una cuenta? </span>
      <a routerLink="/login">Inicia sesión aquí</a>
    </div>
  </form>
</div>
