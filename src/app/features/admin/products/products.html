<section class="products-admin">
  <header class="products-admin__header">
    <div>
      <h1>Gestion de productos</h1>
    </div>
    <button-field
      label="Nuevo producto"
      type="button"
      [fullWidth]="false"
      (clicked)="createProduct()"
    />
  </header>

  @if (errorMessage()) {
    <div class="products-admin__error">{{ errorMessage() }}</div>
  }

  <app-table
    [columns]="tableColumns"
    [rows]="products()"
    [loading]="loading()"
    loadingMessage="Cargando productos..."
    emptyMessage="No hay productos en esta pagina."
    [rowTrackBy]="trackByProduct"
    [currentPage]="currentPage()"
    [totalPages]="totalPages()"
    [totalItems]="totalItems()"
    [itemsPerPage]="itemsPerPage()"
    [disabled]="loading()"
    itemLabel="productos"
    (pageChange)="onPageChange($event)"
  />
</section>
